apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from the base configuration
resources:
  - ../../base

# ВОТ ЭТОТ БЛОК НУЖНО ДОБАВИТЬ:
images:
  - name: s5-server  # Ищем имя из base/deployment.yaml (без тега)
    newName: s5-server
    newTag: latest     # Заменяем на наш локальный тег


# Generate the ConfigMap for the local environment
configMapGenerator:
- name: s5-app-config
  literals:
  - ASPNETCORE_ENVIRONMENT=Development
  - DB_HOST=s5-db-cluster-rw # Or maybe 'localhost' or a docker service name


# Generate the Secret from the .env file
secretGenerator:
- name: s5-db-credentials
  envs:
  - ../../../../.env
