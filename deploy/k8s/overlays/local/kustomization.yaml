apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

resources:
  - ../../base

namespace: s5-local

# Подтягиваем замены (replacements) для синхронизации имен БД
replacements:
  - path: ../../base/db-replacements.yaml

# 1. Единый Генератор Секретов из .env
secretGenerator:
  - name: s5-app-secrets
    behavior: replace
    envs:
      - ../../../../.env

# 2. Единый Генератор ConfigMap из .env
configMapGenerator:
  - name: s5-app-config
    behavior: replace
    envs:
      - ../../../../.env
    literals:
      # Переопределяем хост БД для работы ВНУТРИ кластера
      - DB_HOST=s5-db-cluster-rw
      # Фиксируем окружение для этой сборки
      - ASPNETCORE_ENVIRONMENT=Development

# 3. Подмена образов для локального запуска
images:
  - name: s5-db
    newName: s5-db
    newTag: 18.3-v1.0.0
  - name: s5-server
    newName: s5-server
    newTag: "1.0.1"