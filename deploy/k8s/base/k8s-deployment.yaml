apiVersion: apps/v1
kind: Deployment
metadata:
  name: s5-server-deployment
  labels:
    app: s5-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s5-server
  template:
    metadata:
      labels:
        app: s5-server
    spec:
      initContainers:
        # 1. Ожидание готовности базы
        - name: wait-for-db
          image: postgres:18.3
          command: 
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at s5-db-cluster-rw:5432..."
              until pg_isready -h s5-db-cluster-rw -p 5432; do
                sleep 5
              done
              echo "Database is reachable! Proceeding..."

        # 2. Выполнение миграций
        - name: db-migration
          image: s5-server
          command: ["dotnet"] 
          args: ["S5Server.dll", "--migrate"]
          env:
            # БД Конфигурация
            - name: PrimaryConnection__DB_Host
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: DB_HOST } }
            - name: PrimaryConnection__Port
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: DB_PORT } }
            - name: PrimaryConnection__DB_Name
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: DB_NAME } }
            - name: PrimaryConnection__DB_Username
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: DB_USER } }
            - name: PrimaryConnection__DB_Password
              valueFrom: { secretKeyRef: { name: s5-app-secrets, key: DB_PASSWORD } }
            # Общие настройки (могут понадобиться при миграции данных)
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: ASPNETCORE_ENVIRONMENT } }

      containers:
        - name: s5-server
          image: s5-server
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: https
          env:
            # --- ХАРДКОД (как просили в п.4) ---
            - name: ASPNETCORE_URLS
              value: "http://+:8080;https://+:8081"
            - name: ASPNETCORE_Kestrel__Certificates__Default__Path
              value: "/app/aspnetapp.pfx" # Оставляем путь захардкоженным
            
            # --- СЕКРЕТЫ ---
            - name: ASPNETCORE_Kestrel__Certificates__Default__Password
              valueFrom: { secretKeyRef: { name: s5-app-secrets, key: KESTREL_CERT_PASSWORD } }
            - name: PrimaryConnection__DB_Password
              valueFrom: { secretKeyRef: { name: s5-app-secrets, key: DB_PASSWORD } }
            - name: JwtSettings__Secret
              valueFrom: { secretKeyRef: { name: s5-app-secrets, key: JwtSettings__Secret } }
            - name: SERVICE_USER_PASSWORD
              valueFrom: { secretKeyRef: { name: s5-app-secrets, key: SERVICE_USER_PASSWORD } }

            # --- КОНФИГУРАЦИЯ (ConfigMap) ---
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: ASPNETCORE_ENVIRONMENT } }
            - name: TWO_FACTOR_MODE
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: TWO_FACTOR_MODE } }
            - name: TOTP__Issuer
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: TOTP__Issuer } }
            
            # БД Параметры
            - name: PrimaryConnection__DB_Host
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: DB_HOST } }
            - name: PrimaryConnection__Port
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: DB_PORT } }
            - name: PrimaryConnection__DB_Name
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: DB_NAME } }
            - name: PrimaryConnection__DB_Username
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: DB_USER } }

            # JWT Параметры
            - name: JwtSettings__Issuer
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: JwtSettings__Issuer } }
            - name: JwtSettings__Audience
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: JwtSettings__Audience } }
            - name: JwtSettings__ExpiryInMinutes
              valueFrom: { configMapKeyRef: { name: s5-app-config, key: JwtSettings__ExpiryInMinutes } }

          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10