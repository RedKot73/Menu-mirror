stages:
  - build

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

build-job:
  stage: build
  image: docker:latest
  tags:
    - wsl-runner.S5
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Сборка образа (без использования --provenance для совместимости)
    - docker build --provenance=false -t $IMAGE_TAG .
    # Отправка образа в ваш GitLab Container Registry
    - docker push $IMAGE_TAG
  rules:
    # Собираем образ для веток development и main
    - if: $CI_COMMIT_BRANCH == "development"
    - if: $CI_COMMIT_BRANCH == "main"