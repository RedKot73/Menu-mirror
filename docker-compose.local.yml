# 1. Описываем общие настройки для всех .NET сервисов (якорь &common-env)
x-environment-common: &common-env
  PrimaryConnection__DB_Host: db
  PrimaryConnection__Port: 5432
  PrimaryConnection__DB_Name: ${DB_NAME}
  PrimaryConnection__DB_Username: ${DB_USER}
  PrimaryConnection__DB_Password: ${DB_PASSWORD}
  # Убедитесь, что эта переменная совпадает с логикой в Program.cs
  ASPNETCORE_ENVIRONMENT: Development
  
services:
  db:
    build:
      context: ./deploy/database
      dockerfile: Dockerfile.local
    container_name: s5-db-local
    # Явно указываем команду запуска с SSL, чтобы переопределить стандартное поведение
    command: >
      postgres 
      -c ssl=on 
      -c ssl_cert_file=/etc/postgresql/ssl/server.crt 
      -c ssl_key_file=/etc/postgresql/ssl/server.key
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    volumes:
      - pg_local_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s5-migration-local
    environment:
      <<: *common-env
    entrypoint: ["/bin/sh", "-c"]
    command: 
      - |
        echo ">>> [STEP 2/3] STARTING DATABASE MIGRATIONS..."
        dotnet S5Server.dll --migrate
        if [ $$? -eq 0 ]; then
          echo ">>> [STEP 2/3] SUCCESS: MIGRATIONS COMPLETED SUCCESSFULLY."
        else
          echo ">>> [STEP 2/3] ERROR: MIGRATIONS FAILED!"
          exit 1
        fi
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s5-server-local
    environment:
      <<: *common-env
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo ">>> [STEP 3/3] ALL CHECKS PASSED. STARTING S5 SERVER..."
        dotnet S5Server.dll
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "8081:8081"

volumes:
  pg_local_data: