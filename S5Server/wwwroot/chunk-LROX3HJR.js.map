<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
  <!-- ParentId Column -->
  <!--
  <ng-container matColumnDef="parentId">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Батьківський</th>
    <td mat-cell *matCellDef="let item">{{ item.parentId }}</td>
  </ng-container>
-->
  <!-- Level1 Column -->
  <ng-container matColumnDef="level1">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Область</th>
    <td mat-cell *matCellDef="let item">{{ item.level1 }}</td>
  </ng-container>
  <!-- Level2 Column -->
  <ng-container matColumnDef="level2">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Район</th>
    <td mat-cell *matCellDef="let item">{{ item.level2 }}</td>
  </ng-container>
  <!-- Level3 Column -->
  <ng-container matColumnDef="level3">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Громада</th>
    <td mat-cell *matCellDef="let item">{{ item.level3 }}</td>
  </ng-container>
  <!-- Level4 Column -->
  <ng-container matColumnDef="level4">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Місто/Село</th>
    <td mat-cell *matCellDef="let item">{{ item.level4 }}</td>
  </ng-container>

  <!-- Level4 Column -->
  <ng-container matColumnDef="levelExt">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Район міста</th>
    <td mat-cell *matCellDef="let item">{{ item.levelExt }}</td>
  </ng-container>

  <!-- Category Column -->
  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Категорія</th>
    <td mat-cell *matCellDef="let item">{{ item.category }}</td>
  </ng-container>
  <!-- Value Column -->
  <ng-container matColumnDef="value">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Назва</th>
    <td mat-cell *matCellDef="let item">{{ item.value }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    (click)="selectionMode() && selectItem(row)"
    [class.selectable-row]="selectionMode()"
  ></tr>
</table>

<mat-paginator
  #paginator
  class="paginator"
  [length]="totalCount()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[10, 25, 50, 100, 200]"
  [pageIndex]="pageIndex()"
  (page)="onPageChange($event)"
  showFirstLastButtons
>
</mat-paginator>
