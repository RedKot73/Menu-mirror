<div
  class="node-content"
  [class.leaf-node]="!node().hasChildren"
  [style.padding-left.px]="node().level * 20"
>
  <!-- Кнопка разворачивания только для узлов с детьми -->
  @if (node().hasChildren) {
  <button
    mat-icon-button
    [attr.aria-label]="'Розгорнути/згорнути ' + node().name"
    class="toggle-button"
    (click)="onToggle()"
  >
    @if (node().isLoading) {
    <mat-spinner diameter="20"></mat-spinner>
    } @else {
    <mat-icon class="mat-icon-rtl-mirror">
      {{ isExpanded() ? 'expand_more' : 'chevron_right' }}
    </mat-icon>
    }
  </button>
  } @else {
  <!-- Отступ для листовых узлов теперь через padding-left -->
  <div class="leaf-spacer"></div>
  }

  <!-- Информация о подразделении -->
  <div class="unit-info">
    <button
      class="unit-main"
      type="button"
      (click)="onSelect(); $event.stopPropagation()"
      [attr.aria-label]="'Вибрати підрозділ ' + node().shortName"
    >
      <span class="unit-name">{{ node().shortName }}</span>
    </button>
    <div class="unit-details">
      @if (node().forceType) {
      <span class="force-type">{{ node().forceType }}</span>
      } @if (node().unitType) {
      <span class="unit-type">{{ node().unitType }}</span>
      } @if (node().assignedUnitId) {
      <mat-icon class="assigned-icon" matTooltip="Приданий підрозділ">assignment_ind</mat-icon>
      }
    </div>
  </div>

  <!-- Меню действий с узлом (показываем только если передан шаблон) -->
  @if (nodeActionsTemplate()) {
  <div class="node-actions">
    <ng-container
      *ngTemplateOutlet="nodeActionsTemplate(); context: { $implicit: node() }"
    ></ng-container>
  </div>
  }
</div>
