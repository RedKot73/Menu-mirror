<div class="container" #containerRef>
  <div
    class="panel nav-panel"
    [style.width.%]="navPanelWidth()"
    [class.collapsed]="isNavPanelCollapsed()"
  >
    <div class="panel-header" [class.hidden]="isNavPanelCollapsed()">
      <h3>Дерево підрозділів</h3>
      <div class="header-actions">
        <button mat-raised-button color="primary" (click)="refresh()" [disabled]="loading()">
          <mat-icon>refresh</mat-icon>
          Оновити
        </button>
        <button mat-raised-button color="primary" (click)="CreateUnit()" [disabled]="loading()">
          <mat-icon>add</mat-icon>
          Створити
        </button>
      </div>
    </div>
    <div class="panel-content" [class.hidden]="isNavPanelCollapsed()">
      <!-- Дерево подразделений -->
      <unit-tree
        (unitSelected)="onUnitSelected($event)"
        (unitUpdated)="onUnitUpdated($event)"
        class="unit-tree"
      >
        <!-- Меню действий с узлом -->
        <ng-template #nodeActions let-node>
          <div class="node-actions">
            <button
              mat-icon-button
              [matMenuTriggerFor]="nodeMenu"
              matTooltip="Дії з підрозділом"
              (click)="$event.stopPropagation()"
            >
              <mat-icon>more_vert</mat-icon>
            </button>

            <mat-menu #nodeMenu="matMenu">
              <button mat-menu-item (click)="addChild(node); $event.stopPropagation()">
                <mat-icon color="primary">add</mat-icon>
                <span>Додати дочірній підрозділ</span>
              </button>
              <button mat-menu-item (click)="edit(node); $event.stopPropagation()">
                <mat-icon color="accent">edit</mat-icon>
                <span>Редагувати</span>
              </button>
              <mat-divider></mat-divider>
              <button
                mat-menu-item
                (click)="delete(node); $event.stopPropagation()"
                [disabled]="node.hasChildren"
                class="delete-action"
              >
                <mat-icon>delete</mat-icon>
                <span>Видалити</span>
              </button>
            </mat-menu>
          </div>
        </ng-template>
      </unit-tree>
    </div>
  </div>

  <div class="splitter" [class.dragging]="isDragging()" (mousedown)="startDrag($event)">
    <div class="splitter-handle"></div>
    <div class="splitter-controls">
      <button
        class="toggle-btn"
        (click)="toggleNavPanel()"
        [title]="
          isNavPanelCollapsed() ? 'Показати дерево підрозділів' : 'Приховати дерево підрозділів'
        "
      >
        <span class="arrow" [class.collapsed]="isNavPanelCollapsed()">
          {{ isNavPanelCollapsed() ? '▶' : '◀' }}
        </span>
      </button>
    </div>
  </div>

  <div class="panel content-panel" [style.width.%]="contentPanelWidth()">
    <div class="panel-header">
      <!-- Toolbar с заголовком -->
      <div class="unit-toolbar">
        <h3>{{ selectedUnitTitle() }}</h3>
      </div>
    </div>
    <div class="panel-content">
      <!-- Основное содержимое -->
      <unit-content
        [selectedUnit]="selectedUnit()"
        [sidenavOpen]="!isNavPanelCollapsed()"
        (showSidenav)="toggleNavPanel()"
      >
      </unit-content>
    </div>
  </div>
</div>
