<h2 mat-dialog-title>
  <mat-icon>data_object</mat-icon>
  {{ data.title || 'Редагування JSON даних' }}
</h2>

<mat-dialog-content>
  <div class="editor-toolbar">
    <button
      mat-icon-button
      (click)="formatJson()"
      [disabled]="data.readOnly"
      matTooltip="Форматувати JSON"
    >
      <mat-icon>auto_fix_high</mat-icon>
    </button>

    <button mat-icon-button (click)="validateJson()" matTooltip="Перевірити валідність JSON">
      <mat-icon>check_circle</mat-icon>
    </button>
  </div>

  <app-codemirror-editor
    [content]="jsonContent()"
    [language]="'javascript'"
    [readOnly]=true
    class="json-editor"
  >
  </app-codemirror-editor>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onClose()">
    <mat-icon>close</mat-icon>
    Закрити
  </button>
</mat-dialog-actions>
