<div class="container" #containerRef>
    <div class="panel nav-panel" [style.width.%]="navPanelWidth()" [class.collapsed]="isNavPanelCollapsed()">
        <div class="panel-content" [class.hidden]="isNavPanelCollapsed()">
            <mat-tab-group>
                <mat-tab label="Шаблони документів">
                    <!-- DocTemplate Component -->
                    <app-page-doc-templates [selectedTemplate]="selectedTemplate()"
                                            (templateSelected)="onTemplateSelected($event)">
                    </app-page-doc-templates>
                </mat-tab>
                <mat-tab label="Набори даних">
                    <!-- DataSetTable Component -->
                    <app-template-dataset-table (dataSetSelected)="onDataSetSelected($event)">
                    </app-template-dataset-table>
                </mat-tab>
            </mat-tab-group>
        </div>
    </div>

    <div class="splitter" [class.dragging]="isDragging()" (mousedown)="startDrag($event)">
        <div class="splitter-handle"></div>
        <div class="splitter-controls">
            <button class="toggle-btn" (click)="toggleNavPanel()"
                    matTooltip="{{isNavPanelCollapsed() ? 'Показати' : 'Приховати'}}" [matTooltipPosition]="'above'">

                <span class="arrow" [class.collapsed]="isNavPanelCollapsed()">
                    {{ isNavPanelCollapsed() ? '▶' : '◀' }}
                </span>
            </button>
        </div>
    </div>

    <div class="panel content-panel" [style.width.%]="contentPanelWidth()">
        <mat-tab-group dynamicHeight (selectedIndexChange)="onTabChange($event)">
            <mat-tab label="Шаблон">
                <!-- Template Editor -->
                <app-template-editor #templateEditor
                                     [template]="selectedTemplate()">
                </app-template-editor>
            </mat-tab>
            <mat-tab label="Дані документа">
                <!-- DataSet Editor -->
                <app-dataset-editor #dataSetEditor
                                    [dataSet]="selectedDataSet()">
                </app-dataset-editor>
            </mat-tab>
            <mat-tab label="Результат обробки">
                <!-- Result Editor -->
                <app-result-editor #resultEditor
                                   [templateContent]="templateContent()"
                                   [dataSetContent]="dataSetContent()">
                </app-result-editor>
            </mat-tab>
        </mat-tab-group>
    </div>
</div>
