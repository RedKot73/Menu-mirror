<app-master-detail-layout storageKey="documentDataSet">
  <!-- Left Panel: Дерево підрозділів та Набори даних -->
  <div leftPanel>
    <div class="panel-header">
      <button mat-icon-button (click)="loadDataSets()" matTooltip="Оновити перелік">
        <mat-icon>refresh</mat-icon>
      </button>
      <button
        mat-raised-button
        color="primary"
        (click)="createNewDataSet()"
        matTooltip="Створити набір"
      >
        <mat-icon>add</mat-icon>
        Створити набір
      </button>
    </div>
    <!-- Таблица з наборами даних -->
    <app-template-dataset-table
      #dataSetTable
      (dataSetSelected)="onDataSetSelected($event)"
      class="dataset-table"
    ></app-template-dataset-table>
  </div>

  <!-- Right Panel: Дані документа -->
  <div rightPanel style="display: flex; flex-direction: column; height: 100%">
    <app-units-task-editor #unitsTaskEditor></app-units-task-editor>
  </div>
</app-master-detail-layout>
