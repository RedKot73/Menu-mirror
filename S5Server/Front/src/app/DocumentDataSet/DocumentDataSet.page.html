<div class="container" #containerRef>
  <div
    class="panel nav-panel"
    [style.width.%]="navPanelWidth()"
    [class.collapsed]="isNavPanelCollapsed()"
  >
    <mat-tab-group>
      <mat-tab label="Дерево підрозділів">
        <!-- Кастомный шаблон действий узла -->
        <ng-template #nodeActions let-node>
          <button
            mat-icon-button
            matTooltip="Додати до списку вибору"
            (click)="addUnitToSelection(node); $event.stopPropagation()"
          >
            <mat-icon color="primary">add_circle</mat-icon>
          </button>
        </ng-template>

        <!-- Дерево подразделений с кастомными действиями -->
        <div class="panel-header">
          <button mat-icon-button (click)="loadUnitTree()" matTooltip="Оновити перелік">
            <mat-icon>refresh</mat-icon>
          </button>
          <button
            mat-raised-button
            color="primary"
            (click)="createNewDataSet()"
            matTooltip="Створити набір"
          >
            <mat-icon>add</mat-icon>
            Створити набір
          </button>
        </div>
        <unit-tree class="unit-tree" [nodeActionsTemplate]="nodeActions"></unit-tree>
      </mat-tab>
      <mat-tab label="Набори даних">
        <!-- Таблица з наборами даних -->
        <app-template-dataset-table
          class="dataset-table"
          (dataSetSelected)="onDataSetSelected($event)"
        ></app-template-dataset-table>
      </mat-tab>
    </mat-tab-group>
  </div>

  <div class="splitter" [class.dragging]="isDragging()" (mousedown)="startDrag($event)">
    <div class="splitter-handle"></div>
    <div class="splitter-controls">
      <button
        class="toggle-btn"
        (click)="toggleNavPanel()"
        matTooltip="{{ isNavPanelCollapsed() ? 'Показати управління' : 'Приховати управління' }}"
        [matTooltipPosition]="'above'"
      >
        <span class="arrow" [class.collapsed]="isNavPanelCollapsed()">
          {{ isNavPanelCollapsed() ? '▶' : '◀' }}
        </span>
      </button>
    </div>
  </div>

  <div class="panel content-panel" [style.width.%]="contentPanelWidth()">
    <app-units-task-editor #unitsTaskEditor></app-units-task-editor>
  </div>
</div>
